<div class="terminal-panel p-4 h-full flex flex-col bg-[#05080c]">
    <div class="flex items-center justify-between mb-4 pb-2 border-b border-brand-border">
        <div>
            <h2
                class="text-sm font-bold text-brand-textHighlight flex items-center font-mono uppercase tracking-widest">
                <span class="text-brand-accent mr-2">::</span> TELEMETRY_FEED
            </h2>
        </div>
        <div class="flex items-center bg-[#0a0d14] border border-brand-border h-6">
            <button
                class="px-3 h-full text-[10px] font-mono text-[#080B0F] bg-brand-accent border-r border-brand-border">7D</button>
            <button
                class="px-3 h-full text-[10px] font-mono text-brand-textMuted hover:text-brand-textHighlight transition-none border-r border-brand-border">1M</button>
            <button
                class="px-3 h-full text-[10px] font-mono text-brand-textMuted hover:text-brand-textHighlight transition-none">YTD</button>
        </div>
    </div>

    <div class="flex-1 w-full bg-[#080B0F] border border-brand-border min-h-[300px] relative overflow-hidden"
        id="chart-container">
        <!-- We use standard div for apexcharts to bind to -->
        <div id="price-history-chart" class="w-full h-full"></div>

        <!-- Grid overlay to simulate terminal -->
        <div class="absolute inset-0 pointer-events-none"
            style="background-image: linear-gradient(#1A1F28 1px, transparent 1px), linear-gradient(90deg, #1A1F28 1px, transparent 1px); background-size: 40px 40px; opacity: 0.3;">
        </div>
    </div>

    <div class="mt-4 flex flex-wrap gap-4 font-mono text-[10px] uppercase tracking-widest justify-end">
        <div class="flex items-center space-x-2">
            <span class="h-2 w-2 bg-brand-accent"></span><span class="text-brand-textHighlight">Electronics
                [-18%]</span>
        </div>
        <div class="flex items-center space-x-2">
            <span class="h-2 w-2 bg-brand-success"></span><span class="text-brand-textHighlight">Apparel [+4%]</span>
        </div>
        <div class="flex items-center space-x-2">
            <span class="h-2 w-2 bg-brand-danger"></span><span class="text-brand-textHighlight">Home Goods [-7%]</span>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        if (typeof ApexCharts !== 'undefined') {
            new ApexCharts(document.querySelector("#price-history-chart"), {
                series: [
                    { name: 'Electronics', data: [500, 480, 450, 430, 420, 410, 410] },
                    { name: 'Apparel', data: [150, 150, 155, 158, 160, 160, 156] },
                    { name: 'Home Goods', data: [320, 310, 305, 300, 290, 295, 298] }
                ],
                chart: {
                    height: '100%',
                    type: 'area',
                    background: 'transparent',
                    fontFamily: '"JetBrains Mono", monospace',
                    animations: { enabled: false },
                    toolbar: { show: false },
                    zoom: { enabled: false }
                },
                colors: ['#00e5ff', '#00ff9d', '#ff3366'],
                fill: {
                    type: 'gradient',
                    gradient: { shadeIntensity: 1, opacityFrom: 0.2, opacityTo: 0.0, stops: [0, 100] }
                },
                dataLabels: { enabled: false },
                stroke: { curve: 'straight', width: 2 },
                grid: {
                    borderColor: '#1A1F28',
                    strokeDashArray: 0,
                    xaxis: { lines: { show: true } },
                    yaxis: { lines: { show: true } }
                },
                xaxis: {
                    categories: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                    axisBorder: { color: '#1A1F28' },
                    axisTicks: { color: '#1A1F28' },
                    labels: { style: { colors: '#64748b', fontSize: '10px' } },
                    crosshairs: {
                        show: true,
                        position: 'back',
                        stroke: { color: '#ffb000', width: 1, dashArray: 4 }
                    }
                },
                yaxis: {
                    min: 0,
                    max: 500,
                    tickAmount: 5,
                    labels: {
                        style: { colors: '#64748b', fontSize: '10px' },
                        formatter: (val) => '$' + val
                    }
                },
                legend: { show: false },
                tooltip: {
                    theme: 'dark',
                    marker: { show: false },
                    x: { show: true }
                }
            }).render();
        }
    });
</script>
